<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - LOAN EXPRESS LTD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container auth-container">
    <div class="welcome-banner">
      <div class="welcome-text">
        <h1>Welcome to LOAN EXPRESS LTD</h1>
        <p>Quick registration. Secure access. Professional support.</p>
      </div>
    </div>

    <div class="card auth-card">
      <h1>LOAN EXPRESS LTD</h1>
      <p class="helper">Create your account to request a loan.</p>

      <form id="registerForm">
        <div class="form-grid">
          <label>
            <span>First Name</span>
            <input type="text" id="name" name="name" placeholder="First name" required>
          </label>

          <label>
            <span>Surname</span>
            <input type="text" id="surname" name="surname" placeholder="Surname" required>
          </label>

          <label>
            <span>Email</span>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </label>

          <label>
            <span>Phone Number</span>
            <input type="tel" id="phone" name="phone" placeholder="e.g. 0971234567" required>
          </label>

          <label>
            <span>Password</span>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
          </label>

          <label>
            <span>NRC Number</span>
            <input type="text" id="nrc_number" name="nrc_number" placeholder="Enter NRC number" required>
          </label>
        </div>

        <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
      </form>

      <div id="message" class="helper"></div>
      <div class="auth-links">Already have an account? <a href="login.html">Login</a></div>
    </div>
  </div>

  <script src="app_config.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const message = document.getElementById('message');
    const btn = document.getElementById('registerBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (btn.disabled) return;

      message.textContent = '';
      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = 'Creating Account...';

      const name = document.getElementById('name').value.trim();
      const surname = document.getElementById('surname').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const nrc_number = document.getElementById('nrc_number').value.trim();

      try { 
        const res = await apiFetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            surname,
            email,
            phone,
            password,
            nrc_number
          })
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          message.textContent = data.message || 'Registration successful. Redirecting to login...';
          form.reset();

          setTimeout(() => {
            goToPage('login');
          }, 1200);
        } else {
          message.textContent = data.message || data.error || 'Registration failed.';
        }
      } catch (err) {
        message.textContent = err && err.message
          ? `Registration error: ${err.message}`
          : 'Registration service not available.';
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });
  </script>
</body>
</html>
