<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - LOAN EXPRESS LTD</title>
  <link rel="stylesheet" href="./static/style.css">
  <style>
    body {
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container auth-container">
    <div class="welcome-banner">
      <div class="welcome-text">
        <h1>Welcome to Loan Express Limited</h1>
        <p>Secure access. Fast approvals. Professional support.</p>
      </div>
    </div>
    <div class="card auth-card">
      <h1>LOAN EXPRESS LTD</h1>
      <p class="helper">Sign in to continue.</p>
      <form id="loginForm">
        <div class="form-grid">
          <label>
            <span>First Name</span>
            <input type="text" id="name" placeholder="First name" required>
          </label>
          <label>
            <span>Surname</span>
            <input type="text" id="surname" placeholder="Surname" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" id="email" placeholder="you@example.com" required>
          </label>
          <label>
            <span>Password</span>
            <input type="password" id="password" placeholder="Password" required>
          </label>
        </div>
        <button type="submit" class="btn-primary">Login</button>
      </form>
      <div class="auth-links">Don't have an account? <a href="registration.html">Register</a></div>
      <div id="message" class="helper"></div>
    </div>
  </div>

  <script src="./static/app_config.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const surname = document.getElementById('surname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const msg = document.getElementById('message');
      try {
        const res = await apiFetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({name, surname, email, password})
        });

        const data = await res.json().catch(() => ({}));

        if(res.ok){
          localStorage.setItem('user', JSON.stringify(data.user));
          if(data.user.is_admin == 1){
            goToPage('adminDashboard');
          } else {
            goToPage('userDashboard');
          }
        } else {
          msg.innerText = data.message || 'Login failed.';
        }
      } catch (err) {
        msg.innerText = 'Login service not available.';
      }
    });
  </script>
</body>
</html>
