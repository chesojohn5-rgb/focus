<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - LOAN EXPRESS LTD</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container auth-container">
    <div class="welcome-banner">
      <div class="welcome-text">
        <h1>Welcome to Loan Express Limited</h1>
        <p>Secure access. Fast approvals. Professional support.</p>
      </div>
    </div>

    <div class="card auth-card">
      <h1>LOAN EXPRESS LTD</h1>
      <p class="helper">Sign in to continue.</p>

      <form id="loginForm">
        <div class="form-grid">
          <label>
            <span>Email</span>
            <input type="email" id="email" placeholder="you@example.com" required>
          </label>

          <label>
            <span>Password</span>
            <input type="password" id="password" placeholder="Password" required>
          </label>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">Login</button>
      </form>

      <div class="auth-links">
        Don't have an account? <a href="index.html">Register</a>
      </div>

      <div id="message" class="helper"></div>
    </div>
  </div>

  <script src="app_config.js"></script>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (btn.disabled) return;

      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = "Logging in...";
      msg.innerText = "";

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await apiFetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          localStorage.setItem('user', JSON.stringify(data.user));

          if (data.user && data.user.is_admin == 1) {
            goToPage('adminDashboard');
          } else {
            goToPage('userDashboard');
          }
        } else {
          msg.innerText = data.message || data.error || 'Login failed.';
        }
      } catch (err) {
        msg.innerText = err && err.message
          ? `Login error: ${err.message}`
          : 'Login service not available.';
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });
  </script>
</body>
</html>
